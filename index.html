<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Изометрия — МОДУЛЬНАЯ ВЕРСИЯ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; overflow: hidden; width: 100vw; height: 100vh; }
  canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; }
  #ui-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; font-family: monospace; }
  #info { position: absolute; top: 10px; left: 10px; color: #ccc; font-size: 11px; background: rgba(0,0,0,0.75); padding: 10px 14px; border-radius: 8px; white-space: pre-line; line-height: 1.5; }
  #coords { position: absolute; bottom: 10px; left: 10px; color: #aaa; font-size: 12px; background: rgba(0,0,0,0.6); padding: 6px 10px; border-radius: 4px; }
  #log { position: absolute; bottom: 10px; right: 10px; color: #ff0; font-size: 11px; background: rgba(0,0,0,0.6); padding: 6px 10px; border-radius: 4px; max-width: 350px; text-align: right; }
  #time-indicator { position: absolute; top: 10px; right: 10px; color: #fff; font-size: 14px; background: rgba(0,0,0,0.7); padding: 8px 14px; border-radius: 20px; }
  #player-stats { position: absolute; top: 10px; right: 160px; color: #fff; font-size: 11px; background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 8px; white-space: pre-line; }
  #inventory { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; background: rgba(0,0,0,0.75); padding: 6px 10px; border-radius: 8px; }
  .inv-slot { width: 40px; height: 40px; background: rgba(255,255,255,0.1); border: 2px solid #555; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #fff; position: relative; }
  .inv-slot .count { position: absolute; bottom: 2px; right: 4px; font-size: 10px; color: #fff; }
  #pause-menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; justify-content: center; align-items: center; z-index: 100; pointer-events: auto; background: rgba(0,0,0,0.7); }
  #pause-menu.active { display: flex; }
  #pause-panel { background: #1a1a2e; border: 2px solid #555; border-radius: 16px; padding: 30px 40px; text-align: center; color: #fff; box-shadow: 0 0 40px rgba(0,0,0,0.8); }
  #pause-panel h2 { margin: 0 0 20px 0; font-size: 28px; color: #ffcc00; }
  #pause-panel button { display: block; width: 100%; margin: 10px 0; padding: 12px 20px; font-size: 16px; font-family: monospace; border: 2px solid #666; border-radius: 8px; cursor: pointer; background: #2a2a4a; color: #fff; transition: all 0.2s; }
  #pause-panel button:hover { background: #3a3a6a; border-color: #aaa; }
  .continue-btn { background: #3a6a3a !important; border-color: #5a5 !important; }
  .continue-btn:hover { background: #4a8a4a !important; }
  .new-btn { background: #6a3a3a !important; border-color: #a55 !important; }
  .new-btn:hover { background: #8a4a4a !important; }
  #death-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; justify-content: center; align-items: center; z-index: 90; pointer-events: auto; background: rgba(80,0,0,0.8); }
  #death-screen.active { display: flex; }
  #death-panel { text-align: center; color: #fff; }
  #death-panel h1 { font-size: 48px; color: #ff3333; margin-bottom: 20px; }
  #death-panel button { padding: 12px 30px; font-size: 18px; font-family: monospace; background: #8a3a3a; border: 2px solid #a55; color: #fff; border-radius: 8px; cursor: pointer; }
  #craft-panel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; justify-content: center; align-items: center; z-index: 105; pointer-events: auto; background: rgba(0,0,0,0.7); }
  #craft-panel-inner { background: #1a1a2e; border: 2px solid #888; border-radius: 16px; padding: 20px 25px; text-align: center; color: #fff; box-shadow: 0 0 40px rgba(0,0,0,0.8); max-height: 80vh; overflow-y: auto; min-width: 380px; max-width: 500px; }
  #craft-panel-inner h2 { color: #ffcc00; margin: 0 0 15px 0; }
  #craft-list { text-align: left; }
  .craft-item { background: #2a2a4a; border: 2px solid #555; border-radius: 10px; padding: 12px; margin: 8px 0; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 12px; }
  .craft-item.can-craft { background: #2a3a2a; border-color: #5a5; }
  .craft-item.cannot-craft { background: #3a2a2a; border-color: #a55; opacity: 0.7; cursor: default; }
  .craft-item-icon { font-size: 28px; width: 40px; text-align: center; flex-shrink: 0; }
  .craft-item-icon img { width: 32px; height: 32px; object-fit: contain; }
  .craft-item-info { flex: 1; }
  .craft-item-name { font-size: 16px; font-weight: bold; }
  .craft-item-ingredients { font-size: 11px; color: #aaa; margin-top: 4px; }
  .craft-item-btn { padding: 8px 16px; font-size: 14px; font-family: monospace; background: #4a4; color: #fff; border: 1px solid #6a6; border-radius: 6px; cursor: pointer; white-space: nowrap; }
  .craft-item-btn:disabled { background: #444; border-color: #555; color: #888; cursor: default; }
</style>
</head>
<body>

<div id="ui-layer">
  <div id="info">🟢 WASD/СТРЕЛКИ | 🟠 КЛИК — атака | 🟡 Shift+Колёсико — зум | 🔵 R — возрождение | ⏸️ ESC | 🔧 C — крафт | 🖱️ Колёсико/E/1-8 — инвентарь</div>
  <div id="player-stats">⚔️ Статы</div>
  <div id="time-indicator">☀️ День</div>
  <div id="coords">(0, 0)</div>
  <div id="log"></div>
  <div id="inventory">
    <div class="inv-slot" id="slot0"></div><div class="inv-slot" id="slot1"></div>
    <div class="inv-slot" id="slot2"></div><div class="inv-slot" id="slot3"></div>
    <div class="inv-slot" id="slot4"></div><div class="inv-slot" id="slot5"></div>
    <div class="inv-slot" id="slot6"></div><div class="inv-slot" id="slot7"></div>
  </div>
</div>

<div id="death-screen"><div id="death-panel"><h1>☠️ ВЫ ПОГИБЛИ</h1><p style="font-size:18px;margin-bottom:20px;">R — возрождение</p><button id="btn-respawn">🔄 Возродиться</button></div></div>
<div id="pause-menu"><div id="pause-panel"><h2>⏸️ ПАУЗА</h2><button class="continue-btn" id="btn-continue">▶ Продолжить</button><button class="new-btn" id="btn-new-world">🔄 Новый мир</button><div style="font-size:12px;color:#888;margin-top:15px;">ESC — закрыть</div></div></div>
<div id="craft-panel"><div id="craft-panel-inner"><h2>🔧 КРАФТ</h2><div id="craft-list"></div><div style="margin-top:15px;font-size:12px;color:#888;">C или ESC — закрыть</div></div></div>

<canvas id="game"></canvas>
<footer>v0.0.1.0.0</footer>
<!-- Загрузка модулей в правильном порядке -->
<script src="js/config.js"></script>
<script src="js/player.js"></script>
<script src="js/world.js"></script>
<script src="js/entities.js"></script>
<script src="js/ai.js"></script>
<script src="js/craft.js"></script>
<script src="js/render.js"></script>
<script src="js/input.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>

</body>
</html>
